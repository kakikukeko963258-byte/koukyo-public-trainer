<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#344e7a">
    <title>公共テスト対策</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="assets/icon.svg" alt="" class="brand-icon">
        <div>
          <p>公共</p>
          <h1>テスト対策</h1>
        </div>
      </div>
      <div class="status-chip" id="statusChip">0 / 0</div>
    </header>

    <main class="shell">
      <section class="tool-strip" aria-label="学習設定">
        <div class="mode-tabs" id="modeTabs">
          <button data-mode="study" class="is-active">暗記</button>
          <button data-mode="quiz">小テスト</button>
          <button data-mode="practice">実戦</button>
          <button data-mode="list">一覧</button>
          <button data-mode="misses">ミス</button>
        </div>
        <div class="filters">
          <label>
            範囲
            <select id="categoryFilter"></select>
          </label>
          <label class="toggle">
            <input type="checkbox" id="examOnly" checked>
            <span>期末範囲</span>
          </label>
          <button id="shuffleButton" type="button">並べ替え</button>
        </div>
      </section>

      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <button class="floating-next" id="floatingNext" type="button">次へ</button>

    <nav class="bottom-nav" id="bottomNav" aria-label="主要メニュー">
      <button data-mode="study" class="is-active">暗記</button>
      <button data-mode="quiz">小テスト</button>
      <button data-mode="practice">実戦</button>
      <button data-mode="list">一覧</button>
      <button data-mode="misses">ミス</button>
    </nav>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
